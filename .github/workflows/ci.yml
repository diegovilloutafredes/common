name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  test:
    name: Test & Build
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode 26.4
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '26.4'

      - name: Print Xcode version
        run: xcodebuild -version

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode Project
        run: xcodegen generate

      - name: Run Unit Tests
        run: |
          DEVICE_ID=$(xcrun simctl list devices available -j | python3 -c "import sys,json,re; d=json.load(sys.stdin); p=sorted((int(m.group(1)),v['udid']) for k,vs in d['devices'].items() if 'iOS' in k for v in vs if v.get('isAvailable') for m in [re.search(r'iPhone (\d+)',v['name'])] if m); print('id='+p[-1][1]) if p else exit(1)")
          xcodebuild test \
            -scheme Common \
            -project Common.xcodeproj \
            -destination "$DEVICE_ID" \
            CODE_SIGNING_ALLOWED=NO

      - name: Build XCFramework
        run: |
          chmod +x ./build_xcframework.sh
          ./build_xcframework.sh

  documentation:
    name: Update Docs
    runs-on: macos-26
    needs: test
    permissions:
      contents: write
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode 26.4
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '26.4'

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode Project
        run: xcodegen generate

      - name: Install Jazzy
        run: gem install jazzy

      - name: Generate Documentation
        run: jazzy

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./docs
