name: XCFramework Build Pipeline

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  build-and-prep:
    name: Build Framework & Demo App
    runs-on: macos-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode Project
        run: xcodegen generate

      - name: Run XCFramework Build Script
        run: |
          chmod +x ./build_xcframework.sh
          ./build_xcframework.sh
          
      - name: Upload XCFramework Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Compiled-XCFramework
          path: ./XCFramework/Common.xcframework
          
      - name: Bump version and push tag
        id: tag_version
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: mathieudutour/github-tag-action@v6.2
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          default_bump: patch

      - name: Zip XCFramework for Release
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          cd XCFramework
          zip -r Common.xcframework.zip Common.xcframework

      - name: Create GitHub Release
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag_version.outputs.new_tag || github.ref_name }}
          name: Release ${{ steps.tag_version.outputs.new_tag || github.ref_name }}
          files: ./XCFramework/Common.xcframework.zip
          generate_release_notes: true


  documentation:
    name: Update Docs
    runs-on: macos-latest
    needs: build-and-prep
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode Project
        run: xcodegen generate

      - name: Install Jazzy
        run: gem install jazzy

      - name: Generate Documentation
        run: jazzy

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./docs
