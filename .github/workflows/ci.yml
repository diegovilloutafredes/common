name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  test:
    name: Test & Build
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: |
          LATEST=$(ls -d /Applications/Xcode_*.app 2>/dev/null | sort -V | tail -1)
          [ -z "$LATEST" ] && LATEST=/Applications/Xcode.app
          sudo xcode-select -s "$LATEST/Contents/Developer"
          xcodebuild -version

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode Project
        run: xcodegen generate

      - name: Run Unit Tests
        run: |
          DEVICE_ID=$(xcrun simctl list devices available -j | python3 -c "
import sys,json,re
data=json.load(sys.stdin)
phones=[(int(m.group(1)),d['udid']) for rt,devs in data['devices'].items() if 'iOS' in rt for d in devs if d.get('isAvailable') for m in [re.search(r'iPhone (\d+)',d['name'])] if m]
phones.sort()
print('id='+phones[-1][1]) if phones else exit(1)
")
          xcodebuild test \
            -scheme Common \
            -project Common.xcodeproj \
            -destination "$DEVICE_ID" \
            CODE_SIGNING_ALLOWED=NO

      - name: Build XCFramework
        run: |
          chmod +x ./build_xcframework.sh
          ./build_xcframework.sh

  documentation:
    name: Update Docs
    runs-on: macos-15
    needs: test
    permissions:
      contents: write
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: |
          LATEST=$(ls -d /Applications/Xcode_*.app 2>/dev/null | sort -V | tail -1)
          [ -z "$LATEST" ] && LATEST=/Applications/Xcode.app
          sudo xcode-select -s "$LATEST/Contents/Developer"
          xcodebuild -version

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode Project
        run: xcodegen generate

      - name: Install Jazzy
        run: gem install jazzy

      - name: Generate Documentation
        run: jazzy

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./docs
