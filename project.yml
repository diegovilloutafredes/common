name: Common
options:
  deploymentTarget:
    iOS: "16.0"
  developmentLanguage: en
  xcodeVersion: "16.0"

settings:
  base:
    ALWAYS_SEARCH_USER_PATHS: NO
    ASSETCATALOG_COMPILER_GENERATE_SWIFT_ASSET_SYMBOL_EXTENSIONS: YES
    CLANG_ANALYZER_NONNULL: YES
    CLANG_ANALYZER_NUMBER_OBJECT_CONVERSION: YES_AGGRESSIVE
    CLANG_CXX_LANGUAGE_STANDARD: "gnu++20"
    CLANG_ENABLE_MODULES: YES
    CLANG_ENABLE_OBJC_ARC: YES
    CLANG_ENABLE_OBJC_WEAK: YES
    CLANG_WARN_BLOCK_CAPTURE_AUTORELEASING: YES
    CLANG_WARN_BOOL_CONVERSION: YES
    CLANG_WARN_COMMA: YES
    CLANG_WARN_CONSTANT_CONVERSION: YES
    CLANG_WARN_DEPRECATED_OBJC_IMPLEMENTATIONS: YES
    CLANG_WARN_DIRECT_OBJC_ISA_USAGE: YES_ERROR
    CLANG_WARN_DOCUMENTATION_COMMENTS: YES
    CLANG_WARN_EMPTY_BODY: YES
    CLANG_WARN_ENUM_CONVERSION: YES
    CLANG_WARN_INFINITE_RECURSION: YES
    CLANG_WARN_INT_CONVERSION: YES
    CLANG_WARN_NON_LITERAL_NULL_CONVERSION: YES
    CLANG_WARN_OBJC_IMPLICIT_RETAIN_SELF: YES
    CLANG_WARN_OBJC_LITERAL_CONVERSION: YES
    CLANG_WARN_OBJC_ROOT_CLASS: YES_ERROR
    CLANG_WARN_QUOTED_INCLUDE_IN_FRAMEWORK_HEADER: YES
    CLANG_WARN_RANGE_LOOP_ANALYSIS: YES
    CLANG_WARN_STRICT_PROTOTYPES: YES
    CLANG_WARN_SUSPICIOUS_MOVE: YES
    CLANG_WARN_UNGUARDED_AVAILABILITY: YES_AGGRESSIVE
    CLANG_WARN_UNREACHABLE_CODE: YES
    CLANG_WARN__DUPLICATE_METHOD_MATCH: YES
    COPY_PHASE_STRIP: NO
    ENABLE_STRICT_OBJC_MSGSEND: YES
    GCC_C_LANGUAGE_STANDARD: gnu17
    GCC_NO_COMMON_BLOCKS: YES
    GCC_WARN_64_TO_32_BIT_CONVERSION: YES
    GCC_WARN_ABOUT_RETURN_TYPE: YES_ERROR
    GCC_WARN_UNDECLARED_SELECTOR: YES
    GCC_WARN_UNINITIALIZED_AUTOS: YES_AGGRESSIVE
    GCC_WARN_UNUSED_FUNCTION: YES
    GCC_WARN_UNUSED_VARIABLE: YES
    IPHONEOS_DEPLOYMENT_TARGET: "16.0"
    LOCALIZATION_PREFERS_STRING_CATALOGS: YES
    MTL_FAST_MATH: YES
    SDKROOT: iphoneos
    STRING_CATALOG_GENERATE_SYMBOLS: YES
    VERSIONING_SYSTEM: "apple-generic"
    VERSION_INFO_PREFIX: ""
  Debug:
    DEBUG_INFORMATION_FORMAT: dwarf
    ENABLE_TESTABILITY: YES
    GCC_DYNAMIC_NO_PIC: NO
    GCC_OPTIMIZATION_LEVEL: "0"
    GCC_PREPROCESSOR_DEFINITIONS:
      - "DEBUG=1"
      - "$(inherited)"
    MTL_ENABLE_DEBUG_INFO: INCLUDE_SOURCE
    ONLY_ACTIVE_ARCH: YES
    SWIFT_ACTIVE_COMPILATION_CONDITIONS: "DEBUG $(inherited)"
    SWIFT_OPTIMIZATION_LEVEL: "-Onone"
  Release:
    DEBUG_INFORMATION_FORMAT: "dwarf-with-dsym"
    ENABLE_NS_ASSERTIONS: NO
    MTL_ENABLE_DEBUG_INFO: NO
    SWIFT_COMPILATION_MODE: wholemodule
    VALIDATE_PRODUCT: YES

schemes:
  Common:
    build:
      targets:
        Common: all
    archive:
      config: Release
  DemoApp:
    build:
      targets:
        DemoApp: all
    run:
      config: Debug
    test:
      config: Debug
    archive:
      config: Release

targets:
  Common:
    type: framework
    platform: iOS
    deploymentTarget: "16.0"
    sources:
      - path: Common
        excludes:
          - "Common.h"
      - path: Common/Common.h
        headerVisibility: public
    settings:
      base:
        SWIFT_VERSION: "5.0"
        BUILD_LIBRARY_FOR_DISTRIBUTION: YES
        DEFINES_MODULE: YES
        PRODUCT_BUNDLE_IDENTIFIER: com.trust.common
        CODE_SIGN_IDENTITY: ""
        CODE_SIGN_STYLE: Automatic
        CURRENT_PROJECT_VERSION: "1.0.0"
        MARKETING_VERSION: "1.0.0"
        DYLIB_COMPATIBILITY_VERSION: "1"
        DYLIB_CURRENT_VERSION: "1"
        DYLIB_INSTALL_NAME_BASE: "@rpath"
        ENABLE_MODULE_VERIFIER: YES
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_NSHumanReadableCopyright: ""
        INSTALL_PATH: "$(LOCAL_LIBRARY_DIR)/Frameworks"
        LD_RUNPATH_SEARCH_PATHS:
          - "$(inherited)"
          - "@executable_path/Frameworks"
          - "@loader_path/Frameworks"
        MODULE_VERIFIER_SUPPORTED_LANGUAGES: "objective-c objective-c++"
        MODULE_VERIFIER_SUPPORTED_LANGUAGE_STANDARDS: "gnu17 gnu++20"
        SKIP_INSTALL: YES
        SUPPORTS_MACCATALYST: NO
        SUPPORTS_MAC_DESIGNED_FOR_IPHONE_IPAD: NO
        SUPPORTS_XR_DESIGNED_FOR_IPHONE_IPAD: NO
        SWIFT_EMIT_LOC_STRINGS: YES
        SWIFT_INSTALL_OBJC_HEADER: NO
        TARGETED_DEVICE_FAMILY: "1"
      Debug:
        SWIFT_OPTIMIZATION_LEVEL: "-Onone"
      Release:
        SWIFT_COMPILATION_MODE: wholemodule

  DemoApp:
    type: application
    platform: iOS
    deploymentTarget: "26.0"
    sources:
      - path: DemoApp
        excludes:
          - Info.plist
    dependencies:
      - target: Common
        embed: true
    settings:
      base:
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        CODE_SIGN_STYLE: Automatic
        CURRENT_PROJECT_VERSION: "1"
        DEVELOPMENT_TEAM: P896AB2AMC
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_FILE: DemoApp/Info.plist
        INFOPLIST_KEY_CFBundleDisplayName: "Demo App"
        INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: YES
        INFOPLIST_KEY_UILaunchStoryboardName: LaunchScreen
        INFOPLIST_KEY_UISupportedInterfaceOrientations: UIInterfaceOrientationPortrait
        LD_RUNPATH_SEARCH_PATHS:
          - "$(inherited)"
          - "@executable_path/Frameworks"
        MARKETING_VERSION: "1.0.0"
        PRODUCT_BUNDLE_IDENTIFIER: com.trust.DemoApp
        SUPPORTS_MACCATALYST: NO
        SUPPORTS_MAC_DESIGNED_FOR_IPHONE_IPAD: NO
        SUPPORTS_XR_DESIGNED_FOR_IPHONE_IPAD: NO
        SWIFT_EMIT_LOC_STRINGS: YES
        SWIFT_VERSION: "5.0"
        TARGETED_DEVICE_FAMILY: "1"
        IPHONEOS_DEPLOYMENT_TARGET: "26.0"
